name: Continuous Integration

on: [push, pull_request]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          activate-environment: true
          cache-dependency-glob: pyproject.toml

      - name: Install backend dependencies
        run: uv sync --group dev

      - name: Run backend ruff checks
        run: uv run --group dev ruff check backend

      - name: Run backend mypy checks
        run: uv run --group dev mypy .

      - name: Run backend tests with coverage gate
        run: uv run --group dev pytest backend/tests

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests with coverage gate
        working-directory: frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build
